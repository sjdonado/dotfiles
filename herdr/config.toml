onboarding = false

[ui]
show_agent_labels_on_pane_borders = false
agent_panel_sort = "spaces"
mouse_capture = true
copy_on_select = false

[ui.toast]
delivery = "terminal"

[theme]
name = "one-light"
auto_switch = true
dark_name = "one-dark"
light_name = "one-light"

[terminal]
default_shell = "fish"

[keys]
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+shift+x"

[experimental]
# Render inline agent images via Kitty graphics; ghostty supports it.
# Without this, panes show a black gap where the image would be.
kitty_graphics = true
