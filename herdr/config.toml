onboarding = false
[ui]
show_agent_labels_on_pane_borders = false
agent_panel_sort = "spaces"
mouse_capture = true
copy_on_select = true

[ui.toast]
delivery = "terminal"

# TEMPFIX: forced dark. Revert to auto_switch=true (name one-light, dark_name
# one-dark, light_name one-light) once herdr fixes gray pane-selection color.
[theme]
name = "one-dark"
auto_switch = false

[terminal]
default_shell = "fish"

[keys]
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+shift+x"

[experimental]
# Render inline agent images via Kitty graphics; ghostty supports it.
# Without this, panes show a black gap where the image would be.
kitty_graphics = true
