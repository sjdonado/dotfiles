id = "copy-ignored"
name = "copy-ignored"
version = "0.1.1"
min_herdr_version = "0.7.0"
description = "Seed new git worktrees with gitignored files (.env, build caches, deps) using worktrunk's clonefile-based copy-ignored."
platforms = ["macos", "linux"]

[[events]]
on = "worktree.created"
command = ["/bin/sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/copy-ignored.sh\""]
