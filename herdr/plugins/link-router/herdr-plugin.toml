id = "link-router"
name = "Link Router"
version = "0.3.0"
min_herdr_version = "0.7.4"
description = "Rewrite GitHub pull request links to Linear reviews."
platforms = ["macos", "linux"]

[[actions]]
id = "open-in-linear"
title = "Rewrite GitHub pull request to Linear"
command = ["/bin/sh", "open-in-linear.sh"]

[[link_handlers]]
id = "github-pr"
title = "Open GitHub pull request in Linear"
pattern = "^https://github\\.com/[^/]+/[^/]+/pull/[0-9]+(?:[/?#].*)?$"
action = "open-in-linear"
