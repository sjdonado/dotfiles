id = "link-router"
name = "Link Router"
version = "0.2.0"
min_herdr_version = "0.7.4"
description = "Open GitHub pull requests and Linear links in the Linear app."
platforms = ["macos", "linux"]

[[actions]]
id = "open-in-linear"
title = "Open in Linear app"
contexts = ["pane"]
command = ["/bin/sh", "open-in-linear.sh"]

[[link_handlers]]
id = "github-pr"
title = "Open GitHub pull request in Linear"
pattern = "^https://github\\.com/[^/]+/[^/]+/pull/[0-9]+(?:[/?#].*)?$"
action = "open-in-linear"

[[link_handlers]]
id = "linear-app"
title = "Open Linear link in Linear app"
pattern = "^https://linear\\.app/[^/].*$"
action = "open-in-linear"

[[link_handlers]]
id = "linear-review"
title = "Open Linear review in Linear app"
pattern = "^https://linear\\.review/[^/].*$"
action = "open-in-linear"
