# Global workmux config — applies to every project (no per-project
# .workmux.yaml files needed). See https://workmux.raine.dev/
mode: session
agent: claude
nerdfont: true
merge_strategy: merge
worktree_naming: basename

# Each new worktree gets two panes (claude focused, nvim right).
# Sidebar is auto-enabled per session via `post_create` below.
panes:
  - command: "claude --dangerously-skip-permissions"
    focus: true
  - command: "nvim ."
    split: horizontal
    percentage: 70

# Copy nested env files and TLS cert material into every new worktree.
# Globs match arbitrary depth; rooted at the project root.
files:
  copy:
    - .env
    - .env.*
    - "**/.env"
    - "**/.env.*"
    - "**/*.pem"

# Enable the agent sidebar for this session right after creation.
# Manual toggle: `prefix + Ctrl-t` (see tmux/.tmux.conf).
post_create:
  - workmux sidebar --session

# Sidebar is toggled manually via `prefix + Ctrl-t` (see tmux/.tmux.conf)
# or `workmux sidebar`. Settings below apply once enabled.
sidebar:
  width: "15%"
  layout: tiles
