[post-create]
copy = "wt step copy-ignored"
claude = 'WS=$(cmux new-workspace | awk "{print \$2}") && cmux rename-workspace --workspace $WS "$(basename $(pwd))" && cmux resize-pane --workspace $WS --amount 60 && cmux send --workspace $WS "cd $(pwd) && claude --dangerously-skip-permissions\n" && cmux new-split right --workspace $WS'

