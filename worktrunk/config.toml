[post-create]
copy = "wt step copy-ignored"
claude = 'WS=$(cmux new-workspace | awk "{print \$2}") && cmux rename-workspace --workspace $WS "$(basename $(pwd))" && cmux send --workspace $WS "cd $(pwd) && claude --dangerously-skip-permissions\n" && SURF=$(cmux new-split right --workspace $WS | tail -1 | awk "{print \$2}") && cmux send --surface $SURF "cd $(pwd) && zed .\n"'

